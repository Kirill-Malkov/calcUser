<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiered Pricing Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        input[type="range"] {
            accent-color: #4f46e5;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-8 border-b pb-4 border-slate-100">
            Tiered Pricing Calculator
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                <div class="flex justify-between items-center mb-2">
                    <label for="initialUsers" class="font-semibold text-sm uppercase tracking-wider text-slate-600">
                        Initial Users <span class="text-slate-400 normal-case block md:inline md:ml-1">(Стартовые пользователи)</span>
                    </label>
                    <span id="initialUsersVal" class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-lg text-sm">50</span>
                </div>
                <input type="range" id="initialUsers" min="0" max="500" value="50" step="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                <div class="flex justify-between text-xs text-slate-400 mt-1"><span>0</span><span>500</span></div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                <div class="flex justify-between items-center mb-2">
                    <label for="initialPrice" class="font-semibold text-sm uppercase tracking-wider text-slate-600">
                        Initial Price <span class="text-slate-400 normal-case block md:inline md:ml-1">(Начальная цена за 1 польз.)</span>
                    </label>
                    <span id="initialPriceVal" class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-lg text-sm">₪100.00</span>
                </div>
                <input type="range" id="initialPrice" min="50" max="400" value="100" step="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                <div class="flex justify-between text-xs text-slate-400 mt-1"><span>₪50</span><span>₪400</span></div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                <div class="flex justify-between items-center mb-2">
                    <label for="priceStep" class="font-semibold text-sm uppercase tracking-wider text-slate-600">
                        Price Change per Step <span class="text-slate-400 normal-case block md:inline md:ml-1">(Стоимость 1 ступени)</span>
                    </label>
                    <span id="priceStepVal" class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-lg text-sm">₪10.00</span>
                </div>
                <input type="range" id="priceStep" min="5" max="100" value="10" step="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                <div class="flex justify-between text-xs text-slate-400 mt-1"><span>₪5</span><span>₪100</span></div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                <div class="flex justify-between items-center mb-2">
                    <label for="usersPerStep" class="font-semibold text-sm uppercase tracking-wider text-slate-600">
                        Users per Step <span class="text-slate-400 normal-case block md:inline md:ml-1">(Кол-во пользователей в ступени)</span>
                    </label>
                    <span id="usersPerStepVal" class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-lg text-sm">25</span>
                </div>
                <input type="range" id="usersPerStep" min="5" max="100" value="25" step="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                <div class="flex justify-between text-xs text-slate-400 mt-1"><span>5</span><span>100</span></div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 md:col-span-2">
                <div class="flex justify-between items-center mb-2">
                    <label for="priceCap" class="font-semibold text-sm uppercase tracking-wider text-slate-600">
                        Price Cap Boundary <span class="text-slate-400 normal-case block md:inline md:ml-1">(Максимальная/минимальная граница цены)</span>
                    </label>
                    <span id="priceCapVal" class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-lg text-sm">₪40.00</span>
                </div>
                <input type="range" id="priceCap" min="20" max="400" value="40" step="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                <div class="flex justify-between text-xs text-slate-400 mt-1"><span>₪20</span><span>₪400</span></div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 mb-8 border-b pb-6 border-slate-100">
            <button id="calculateBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition duration-150 shadow-md shadow-indigo-200 cursor-pointer text-center">
                Generate Tables
            </button>
            <button id="copyBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-xl transition duration-150 shadow-md shadow-emerald-200 cursor-pointer text-center hidden">
                Copy Data for Excel
            </button>
        </div>

        <div id="tablesContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-8 hidden">
            
            <div>
                <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                    System 1: Price Decreases per Step
                </h3>
                <div class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                    <table class="w-full text-left border-collapse" id="decreasingTable">
                        <thead>
                            <tr class="bg-slate-100 text-slate-700 text-sm font-semibold uppercase tracking-wider border-b border-slate-200">
                                <th class="p-4">Users</th>
                                <th class="p-4">Price per User</th>
                                <th class="p-4 text-right">Total Price</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

            <div>
                <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-amber-500"></span>
                    System 2: Price Increases per Step
                </h3>
                <div class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                    <table class="w-full text-left border-collapse" id="increasingTable">
                        <thead>
                            <tr class="bg-slate-100 text-slate-700 text-sm font-semibold uppercase tracking-wider border-b border-slate-200">
                                <th class="p-4">Users</th>
                                <th class="p-4">Price per User</th>
                                <th class="p-4 text-right">Total Price</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const inputs = ['initialUsers', 'initialPrice', 'priceStep', 'usersPerStep', 'priceCap'];
        const elements = {};
        inputs.forEach(id => {
            elements[id] = document.getElementById(id);
            elements[`${id}Val`] = document.getElementById(`${id}Val`);
        });

        const calculateBtn = document.getElementById('calculateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const tablesContainer = document.getElementById('tablesContainer');
        const decTbody = document.getElementById('decreasingTable').querySelector('tbody');
        const incTbody = document.getElementById('increasingTable').querySelector('tbody');

        let lastGeneratedData = null;

        // Sync slider values dynamically to UI text badges (with New Shekel Symbol)
        function updateSliderLabels() {
            elements.initialUsersVal.textContent = elements.initialUsers.value;
            elements.initialPriceVal.textContent = '₪' + parseFloat(elements.initialPrice.value).toFixed(2);
            elements.priceStepVal.textContent = '₪' + parseFloat(elements.priceStep.value).toFixed(2);
            elements.usersPerStepVal.textContent = elements.usersPerStep.value;
            elements.priceCapVal.textContent = '₪' + parseFloat(elements.priceCap.value).toFixed(2);
        }

        inputs.forEach(id => elements[id].addEventListener('input', updateSliderLabels));
        updateSliderLabels(); // Run once initially

        // Computational Core Logic
        calculateBtn.addEventListener('click', () => {
            const initUsers = parseInt(elements.initialUsers.value);
            const initPrice = parseFloat(elements.initialPrice.value);
            const stepDelta = parseFloat(elements.priceStep.value);
            const userStepSize = parseInt(elements.usersPerStep.value);
            const capPrice = parseFloat(elements.priceCap.value);
            const MAX_USERS = 500;

            if (initUsers > MAX_USERS) return;

            const decRows = [];
            const incRows = [];

            let currentStepIdx = 0;

            for (let users = initUsers; users <= MAX_USERS; users += userStepSize) {
                // System 1: Price decreases.
                let priceDec = initPrice - (currentStepIdx * stepDelta);
                if (initPrice > capPrice && priceDec < capPrice) priceDec = capPrice;
                if (initPrice <= capPrice && priceDec < capPrice) priceDec = capPrice; 
                if (priceDec < 0) priceDec = 0; 

                // System 2: Price increases.
                let priceInc = initPrice + (currentStepIdx * stepDelta);
                if (priceInc > capPrice) priceInc = capPrice;

                decRows.push({ users, price: priceDec, total: users * priceDec });
                incRows.push({ users, price: priceInc, total: users * priceInc });

                currentStepIdx++;
                if(userStepSize <= 0) break; 
            }

            lastGeneratedData = { decRows, incRows };

            renderTableBody(decTbody, decRows, 'text-blue-600 font-medium');
            renderTableBody(incTbody, incRows, 'text-amber-600 font-medium');

            tablesContainer.classList.remove('hidden');
            copyBtn.classList.remove('hidden');
            tablesContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        function renderTableBody(tbodyNode, dynamicDataset, styleContext) {
            tbodyNode.innerHTML = '';
            dynamicDataset.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors duration-75";
                tr.innerHTML = `
                    <td class="p-4 font-semibold text-slate-700">${row.users}</td>
                    <td class="p-4 ${styleContext}">₪${row.price.toFixed(2)}</td>
                    <td class="p-4 text-right font-bold text-slate-900">₪${row.total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                `;
                tbodyNode.appendChild(tr);
            });
        }

        // Export Mechanism formatted with standard Tab Delimiters for Excel/Google Sheets
        copyBtn.addEventListener('click', () => {
            if (!lastGeneratedData) return;

            let csvString = "SYSTEM 1: PRICE DECREASES\t\t\t\tSYSTEM 2: PRICE INCREASES\n";
            csvString += "Users\tPrice Per User (ILS)\tTotal Cost (ILS)\t\tUsers\tPrice Per User (ILS)\tTotal Cost (ILS)\n";

            const maxLength = Math.max(lastGeneratedData.decRows.length, lastGeneratedData.incRows.length);

            for(let i = 0; i < maxLength; i++) {
                const dec = lastGeneratedData.decRows[i];
                const inc = lastGeneratedData.incRows[i];

                let rowString = "";
                
                if(dec) {
                    rowString += `${dec.users}\t${dec.price.toFixed(2)}\t${dec.total.toFixed(2)}`;
                } else {
                    rowString += "\t\t";
                }

                rowString += "\t\t"; 

                if(inc) {
                    rowString += `${inc.users}\t${inc.price.toFixed(2)}\t${inc.total.toFixed(2)}`;
                }

                csvString += rowString + "\n";
            }

            navigator.clipboard.writeText(csvString).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = "✓ Copied! Paste directly into Excel";
                copyBtn.classList.replace('bg-emerald-600', 'bg-teal-600');
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.classList.replace('bg-teal-600', 'bg-emerald-600');
                }, 3000);
            }).catch(err => {
                alert('Failed to copy data.');
            });
        });
    </script>
</body>
</html>
